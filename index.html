<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나만의 커스텀 동영상 플레이어</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="upload-section">
    <input type="file" id="file-input" accept="video/mp4">
    <label for="file-input" class="upload-btn">📁 방문자 동영상 업로드 (.mp4)</label>
  </div>

  <div class="main-container">
    <!-- 동영상 플레이어 메인 영역 -->
    <div class="video-container">
      <video class="video"></video>
      
      <!-- 커스텀 컨트롤러 -->
      <div class="controls">
        <input type="range" class="progress-bar" min="0" max="100" value="0">
        <div class="buttons">
          <button class="play-btn">▶</button>
          <span class="time-display">00:00 / 00:00</span>
          <input type="range" class="volume-bar" min="0" max="1" step="0.1" value="1">
        </div>
      </div>
    </div>

    <!-- 재생 목록 영역 -->
    <div class="playlist-container">
      <h3>재생 목록</h3>
      <ul id="playlist">
        <!-- 고정 영상 및 유저 업로드 영상이 여기에 추가됨 -->
      </ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
