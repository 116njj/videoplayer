<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erato.dev | Video Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="header-logo-bar">
    <a href="https://github.io" class="logo-link">
      <div class="logo-icon-box">
        <svg xmlns="http://w3.org" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ghost-svg">
          <path d="M9 10h.01"></path>
          <path d="M15 10h.01"></path>
          <path d="M12 2a8 8 0 0 0-8 8v12l3-3 2.5 2.5L12 19l2.5 2.5L17 19l3 3V10a8 8 0 0 0-8-8z"></path>
        </svg>
      </div>
      <span class="logo-text">Erato<span class="logo-dot">.</span></span>
    </a>
    <span class="page-indicator">/ Video Player</span>
  </div>

  <div class="upload-section">
    <div class="form-group">
      <input type="text" id="input-filename" placeholder="📁 videos 폴더 내 실제 파일명 (예: test.mp4)">
      <input type="text" id="input-title" placeholder="✏️ 동영상 재생 목록 제목 입력">
      <button id="generator-btn" class="upload-btn">⚡ 영상 등록 및 URL 단축 압축</button>
    </div>
    <button id="share-btn" class="share-btn">📢 현재 플레이리스트 단축 공유 링크 복사</button>
  </div>

  <div class="main-container">
    <div class="video-container" id="video-container">
      <video class="video" playsinline></video>
      
      <!-- 💡 유튜브 감성의 회전식 로딩 스피너 레이어 신규 추가 -->
      <div id="loading-spinner" class="spinner-overlay">
        <div class="spinner"></div>
      </div>
      
      <div id="speed-badge">2.0x >></div>

      <div class="controls">
        <input type="range" class="progress-bar" min="0" max="100" value="0">
        <div class="buttons">
          <button class="play-btn">▶</button>
          <span class="time-display">00:00 / 00:00</span>
          <input type="range" class="volume-bar" min="0" max="1" step="0.1" value="1">
          <button class="fullscreen-btn" style="margin-left: auto;">⛶</button>
        </div>
      </div>
    </div>

    <div class="playlist-container">
      <div class="playlist-header">
        <svg xmlns="http://w3.org" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
        <h3>재생 목록 (URL 아카이브)</h3>
      </div>
      <ul id="playlist"></ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
