<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나만의 커스텀 동영상 플레이어</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 💡 여기에 동영상 링크를 넣고 등록하면 자동으로 해당 URL로 이동합니다 -->
  <div class="upload-section">
    <input type="text" id="input-url" placeholder="동영상 .mp4 주소(URL) 입력">
    <input type="text" id="input-title" placeholder="동영상 제목 입력">
    <button id="generator-btn" class="upload-btn">🔗 영상 등록 및 URL 이동</button>
  </div>

  <div class="main-container">
    <div class="video-container">
      <video class="video"></video>
      
      <div class="controls">
        <input type="range" class="progress-bar" min="0" max="100" value="0">
        <div class="buttons">
          <button class="play-btn">▶</button>
          <span class="time-display">00:00 / 00:00</span>
          <input type="range" class="volume-bar" min="0" max="1" step="0.1" value="1">
        </div>
      </div>
    </div>

    <div class="playlist-container">
      <h3>재생 목록</h3>
      <ul id="playlist"></ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
