<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>byErato 비디오 플레이어</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 상단 제어 영역 (파일명과 동영상 제목 수집 폼) -->
  <div class="upload-section">
    <div class="form-group">
      <input type="text" id="input-filename" placeholder="videos 폴더에 올린 실제 파일명 입력 (예: test.mp4)">
      <input type="text" id="input-title" placeholder="동영상 제목을 입력하세요">
      <button id="generator-btn" class="upload-btn">🔗 영상 등록 및 URL 압축</button>
    </div>
    <button id="share-btn" class="share-btn">📢 현재 플레이리스트 공유하기 (목록 주소 복사)</button>
  </div>

  <div class="main-container">
    <div class="video-container" id="video-container">
      <video class="video" playsinline></video>
      
      <div id="speed-badge">2.0x >></div>

      <div class="controls">
        <input type="range" class="progress-bar" min="0" max="100" value="0">
        <div class="buttons">
          <button class="play-btn">▶</button>
          <span class="time-display">00:00 / 00:00</span>
          <input type="range" class="volume-bar" min="0" max="1" step="0.1" value="1">
          <button class="fullscreen-btn" style="margin-left: auto;">⛶</button>
        </div>
      </div>
    </div>

    <div class="playlist-container">
      <h3>재생 목록 (URL 데이터 연동)</h3>
      <ul id="playlist"></ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
