<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>byErato 비디오 플레이어</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 💡 최상단 KOWAI 감성 커스텀 헤더 로고 바 추가 -->
  <div class="header-logo-bar">
    <div class="logo-icon">
      <!-- SVG로 구현한 유령 심볼 아이콘 -->
      <svg viewBox="0 0 24 24" width="22" height="22" fill="#ffffff">
        <path d="M12 2A9 9 0 0 0 3 11v9a1 1 0 0 0 1.62.78L7 18.43l2.38 2.35a1 1 0 0 0 1.41 0L12 19.57l1.21 1.21a1 1 0 0 0 1.41 0L17 18.43l2.38 2.35A1 1 0 0 0 21 20v-9a9 9 0 0 0-9-9zm-3 10a1.5 1.5 0 1 1 1.5-1.5A1.5 1.5 0 0 1 9 12zm6 0a1.5 1.5 0 1 1 1.5-1.5A1.5 1.5 0 0 1 15 12z"/>
      </svg>
    </div>
    <span class="logo-text">KOWAI<span class="logo-dot">.</span></span>
  </div>

  <div class="upload-section">
    <div class="form-group">
      <input type="text" id="input-filename" placeholder="videos 폴더에 올린 실제 파일명 입력 (예: test.mp4)">
      <input type="text" id="input-title" placeholder="동영상 제목을 입력하세요">
      <button id="generator-btn" class="upload-btn">🔗 영상 등록 및 URL 압축</button>
    </div>
    <button id="share-btn" class="share-btn">📢 현재 플레이리스트 공유하기 (목록 주소 복사)</button>
  </div>

  <div class="main-container">
    <div class="video-container" id="video-container">
      <video class="video" playsinline></video>
      
      <div id="speed-badge">2.0x >></div>

      <div class="controls">
        <input type="range" class="progress-bar" min="0" max="100" value="0">
        <div class="buttons">
          <button class="play-btn">▶</button>
          <span class="time-display">00:00 / 00:00</span>
          <input type="range" class="volume-bar" min="0" max="1" step="0.1" value="1">
          <button class="fullscreen-btn" style="margin-left: auto;">⛶</button>
        </div>
      </div>
    </div>

    <div class="playlist-container">
      <h3>재생 목록 (URL 데이터 연동)</h3>
      <ul id="playlist"></ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
