<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>byErato 비디오 플레이어</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 💡 제공해주신 오리지널 KOWAI 헤더 구조 완벽 이식 -->
  <div class="header-logo-bar">
    <a href="#" class="logo-link">
      <div class="logo-icon-box">
        <!-- Lucide Ghost 스타일의 스트로크 유령 아이콘 내장 -->
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ghost-svg">
          <path d="M9 10h.01"></path>
          <path d="M15 10h.01"></path>
          <path d="M12 2a8 8 0 0 0-8 8v12l3-3 2.5 2.5L12 19l2.5 2.5L17 19l3 3V10a8 8 0 0 0-8-8z"></path>
        </svg>
      </div>
      <!-- 💡 타이틀명을 Erato.으로 정밀 변경 -->
      <span class="logo-text">Erato<span class="logo-dot">.</span></span>
    </a>
  </div>

  <div class="upload-section">
    <div class="form-group">
      <input type="text" id="input-filename" placeholder="videos 폴더에 올린 실제 파일명 입력 (예: test.mp4)">
      <input type="text" id="input-title" placeholder="동영상 제목을 입력하세요">
      <button id="generator-btn" class="upload-btn">🔗 영상 등록 및 URL 압축</button>
    </div>
    <button id="share-btn" class="share-btn">📢 현재 플레이리스트 공유하기 (목록 주소 복사)</button>
  </div>

  <div class="main-container">
    <div class="video-container" id="video-container">
      <video class="video" playsinline></video>
      
      <div id="speed-badge">2.0x >></div>

      <div class="controls">
        <input type="range" class="progress-bar" min="0" max="100" value="0">
        <div class="buttons">
          <button class="play-btn">▶</button>
          <span class="time-display">00:00 / 00:00</span>
          <input type="range" class="volume-bar" min="0" max="1" step="0.1" value="1">
          <button class="fullscreen-btn" style="margin-left: auto;">⛶</button>
        </div>
      </div>
    </div>

    <div class="playlist-container">
      <h3>재생 목록 (URL 데이터 연동)</h3>
      <ul id="playlist"></ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
